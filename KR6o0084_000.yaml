front:
  text: 釋摩訶衍論序天册鳳威姚興皇帝製蓋聞月鏡日珠居爰山王禪宮履於雙道遊于百國乘於等觀達於恆剎舉極喜之珠𭺒窺寂滅之靈宮噵聞在昔而猶弗覺其百恆之區惘惘想想方于時始釋矣前聞街巷之稱聲佇教化之期見像迹之虛形瞻風散之界後果面摩尼寶藏之區至于東境當因陀羅網之珠得于沙界溢喜於內獲之心乎祇園之蓮坐棄來以企龜鏡盈慶於外瞻之目乎望舒之涌臺勿返以欽星岸歟朕方解茂花因於七覺之寶林植蓮種於八德之珠池却歡往向即急來後加以金輪東方自來應于威門之區道王之偈先册珠鏡山靈已降至于沙界之面摩耶之文曾記以未來八萬而輪之駕東及過去五百而覺之珠南至矣其為教也於觀音中乞眼手之暇而矚搜過恆之教門其為義也於尸迦中借珠網之功而曜羅塵數之義理以馬鳴先聖光明之德于時具顯龍樹大士妙雲之瑞于方圓啓洋洋肅肅自非結僧那于山林中植雙因于香池中誰懸演水之珠蓋於彌勒已前敷服膺之祕軌於釋迦已後哉釋摩訶衍論者斯乃窮性海之源密藏罄行因之本淵詞以輪星而過於月珠君子莫識其旨歸以錦華而達於日域扣疇莫測其涯際可謂一山界中在兩日月一天下中在兩皇帝朕聞其梵本先在于中天竺遣䮊奉迎近至東界以弘始三年歲次星紀九月上旬於大莊嚴寺親受筆削敬譯斯論直翻譯人筏提摩多三藏傳俗語人劉連陀等執筆之人謝賢金等首尾二年方繕寫畢功兩曜之面圓臨群星之目具舒江河之水澄淨大海之瀾泰然朕未及詳出金輪於坤之上入妙高於掌之內細哉喜門周于法界大哉靜室入于毫端厥若斯理絶稱歟爰翰牘離像歟爰彩畫語則淨名朕呵談則善吉朕吐然而噵言住絶理于諷誦止爽詞于默然破其臺觀莫弘大虛滅其鏡玉勿釋像迹朕將無以于𮇊月文請于龜兔翰借輒申鄙製爰題序云
